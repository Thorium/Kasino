name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test tests/Kasino.Tests/Kasino.Tests.fsproj -c Release

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install npm dependencies
        working-directory: src/Kasino.UI.Web
        run: npm install

      - name: Build
        working-directory: src/Kasino.UI.Web
        run: dotnet fable --run npx vite build
